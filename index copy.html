<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PawPaw BI - 汪星人性格测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes dogBounce {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .animate-dog { animation: dogBounce 1.5s infinite ease-in-out; }
        .serif-font { font-family: "Georgia", "Times New Roman", "Source Han Serif SC", serif; }
        
        /* 增加可爱的背景纹理 */
        .bg-pattern {
            background-color: #f5f4f0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23e5e4df' fill-opacity='0.4' fill-rule='evenodd'%3E%3Cpath d='M5 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm15 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-7.5-5c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM5 40c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm15 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-7.5-5c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z'/%3E%3C/g%3E%3C/svg%3E");
        }

        .stamp {
            border: 1.5px solid rgba(139, 92, 246, 0.5);
            color: rgba(139, 92, 246, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-15deg);
            font-weight: bold;
            font-size: 8px;
            text-transform: uppercase;
        }

        html, body { height: 100%; margin: 0; overflow: hidden; }
        #root { height: 100%; }

        /* 自定义滚动条（以防万一） */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-pattern">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const questions = [
            { id: 1, text: "散步时遇到陌生的狗狗，它的第一反应通常是？", options: [{ text: "热情地冲上去闻屁股，疯狂摇尾巴交朋友", trait: "E" }, { text: "躲在你身后，或者假装没看见默默走开", trait: "I" }] },
            { id: 2, text: "家里来陌生的客人时，它的表现是？", options: [{ text: "兴奋到模糊！扑上去求摸摸求关注", trait: "E" }, { text: "保持警惕，或者回到自己的窝里默默观察", trait: "I" }] },
            { id: 3, text: "带它去宠物公园或者狗吧，它怎么玩？", options: [{ text: "满场飞奔，跟谁都能迅速打成一片", trait: "E" }, { text: "只喜欢跟着你，或者自己在角落闻闻嗅嗅", trait: "I" }] },
            { id: 4, text: "去宠物医院或者洗澡时，它的状态是？", options: [{ text: "依然兴奋，甚至试图跟医生/美容师套近乎", trait: "E" }, { text: "吓得发抖，开启防御模式，试图逃跑", trait: "I" }] },
            { id: 5, text: "如果它正在熟睡，什么声音能让它瞬间弹起？", options: [{ text: "零食袋撕开的“呲啦”声！", trait: "F" }, { text: "门外奇怪的脚步声或者门铃声", trait: "N" }] },
            { id: 6, text: "你给它买了一个奇形怪状的新玩具，它会？", options: [{ text: "咬两口发现不能吃，就扔在一边不管了", trait: "F" }, { text: "兴奋地研究、拆解，能自己玩上好半天", trait: "N" }] },
            { id: 7, text: "出门散步时，它最喜欢做的事情是？", options: [{ text: "低头狂吸，捡地上的不明物体试图品尝", trait: "F" }, { text: "追逐落叶、蝴蝶，或者盯着下水道看半天", trait: "N" }] },
            { id: 8, text: "训练它学习新动作时，最有效的诱惑是？", options: [{ text: "绝对是好吃的肉干，没吃的不干活", trait: "F" }, { text: "夸张的赞美，或者它最爱的网球/玩具", trait: "N" }] },
            { id: 9, text: "你坐在沙发上看电视，它通常会在哪里？", options: [{ text: "必须紧紧贴着你，甚至要坐在你身上", trait: "A" }, { text: "自己在狗窝里，或者沙发的另一端躺着", trait: "T" }] },
            { id: 10, text: "你准备出门上班，关门那一刻它的眼神是？", options: [{ text: "依依不舍，甚至扒着门嘤嘤叫求带走", trait: "A" }, { text: "毫无波澜，甚至转身回窝准备补个回笼觉", trait: "T" }] },
            { id: 11, text: "当它犯了错被你严厉批评时，它会？", options: [{ text: "飞机耳、翻肚皮，疯狂摇尾巴讨好求原谅", trait: "A" }, { text: "跟你顶嘴（对骂），或者扭头走开不理你", trait: "T" }] },
            { id: 12, text: "晚上睡觉的时候，它的习惯是？", options: [{ text: "必须挤上你的床，最好能枕着你的胳膊睡", trait: "A" }, { text: "巡视一圈领地后，在自己的专属地盘睡", trait: "T" }] },
            { id: 13, text: "面对它不喜欢吃的普通狗粮，它会？", options: [{ text: "叹口气，饿了还是会乖乖吃掉", trait: "J" }, { text: "直接打翻饭盆，或者绝食抗议直到你加肉", trait: "P" }] },
            { id: 14, text: "当它独自在家大半天后，你回家看到的场景通常是？", options: [{ text: "一切如常，它甚至还在原来的位置睡觉", trait: "J" }, { text: "垃圾桶倒了，拖鞋少了一只，沙发有个坑...", trait: "P" }] },
            { id: 15, text: "你突然大声叫它的名字，它通常的反应是？", options: [{ text: "立刻停下手头事跑过来（或者转头看你）", trait: "J" }, { text: "看心情，有时候装聋，有时候选择性听见", trait: "P" }] }
        ];

        const resultsData = {
            "EFAJ": { title: "甜心饭桶", desc: "万物皆可吃，只要你给的我都爱！最爱贴贴，社交满分的暖心小天使。", tags: ["社交悍匪", "干饭狂魔"] },
            "EFAP": { title: "社交显眼包", desc: "为了混口饭吃什么绝活都能整出来，到处散发魅力，是个有点小调皮的公关大师。", tags: ["骗吃骗喝", "有点皮"] },
            "EFTJ": { title: "巡场干饭王", desc: "热情开朗但很有原则（尤其是对食物），是个守规矩的好狗狗。", tags: ["热情保安", "吃饭第一"] },
            "EFTP": { title: "街头小霸王", desc: "热情奔放，为了一口吃的敢于挑战一切规则，谁也管不住。", tags: ["放荡不羁", "为食痴狂"] },
            "ENAJ": { title: "阳光小巡警", desc: "对世界充满好奇，但最爱的还是你。聪明听话，走到哪里都要跟你汇报。", tags: ["好奇宝宝", "聪明俐落"] },
            "ENAP": { title: "乐天派二哈", desc: "脑洞极大，精力极其旺盛！走到哪拆到哪，犯错后还会撒娇求原谅。", tags: ["拆迁办主任", "脑洞清奇"] },
            "ENTJ": { title: "居委会主任", desc: "热心肠，爱管闲事，充满探索精神且遵守纪律，小区里的汪星人领袖。", tags: ["老干部", "爱管闲事"] },
            "ENTP": { title: "整活发明家", desc: "哈士奇精神内核！总能想出一百种让你崩溃的新玩法，聪明全用在搞破坏上了。", tags: ["整活大师", "反骨仔"] },
            "IFAJ": { title: "沙发土豆", desc: "胆子小，只粘你一个人。最大的爱好就是趴在你腿上等投喂，软糯可欺。", tags: ["软糯小甜豆", "躺平大师"] },
            "IFAP": { title: "绿茶小作精", desc: "表面楚楚可怜惹人疼，背地里为了偷吃零食能把家里翻个底朝天。", tags: ["两副面孔", "偷吃王者"] },
            "IFTJ": { title: "佛系美食家", desc: "狗生格言：“吃饱了就睡”。高冷不惹事，只对饭盆里的东西有反应。", tags: ["看破红尘", "只爱吃饭"] },
            "IFTP": { title: "偷吃特种兵", desc: "独来独往的暗影刺客，平时不理人，但家里的肉干总是离奇失踪。", tags: ["暗影刺客", "干饭无影手"] },
            "INAJ": { title: "社恐小跟班", desc: "对外面的世界充满警惕，默默观察一切，只有躲在你身后才有安全感。", tags: ["重度社恐", "只爱你"] },
            "INAP": { title: "粘人神经质", desc: "胆小又爱玩，常常被自己吓到。只敢在家里称王称霸，一出门就秒怂。", tags: ["窝里横", "一惊一乍"] },
            "INTJ": { title: "哲学思考狗", desc: "经常静静地看着窗外思考狗生，拥有丰富的精神世界，高冷且自律。", tags: ["思想家", "高冷总裁"] },
            "INTP": { title: "闷骚破坏王", desc: "平时一声不吭，趁你不在的时候默默搞个大的，致力于研究沙发内部结构。", tags: ["拆家学者", "好奇心重"] }
        };

        function App() {
            const [gameState, setGameState] = useState('start');
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [scores, setScores] = useState({ E: 0, I: 0, F: 0, N: 0, A: 0, T: 0, J: 0, P: 0 });
            const [finalType, setFinalType] = useState(null);
            const [userPhoto, setUserPhoto] = useState(null);

            const handleAnswer = (trait) => {
                const newScores = { ...scores, [trait]: scores[trait] + 1 };
                setScores(newScores);
                if (currentQIndex < questions.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                } else {
                    const getDim = (t1, t2) => (newScores[t1] >= newScores[t2] ? t1 : t2);
                    setFinalType(getDim('E', 'I') + getDim('F', 'N') + getDim('A', 'T') + getDim('J', 'P'));
                    setGameState('result');
                }
            };

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setUserPhoto(ev.target.result);
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="flex justify-center h-full items-center p-2 sm:p-4">
                    {/* 卡片主体 */}
                    <div className="w-full max-w-[390px] h-[92vh] sm:h-[844px] bg-white rounded-[24px] shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col relative border-4 border-stone-800">
                        
                        {/* 装饰性的小爪子和便便 */}
                        <div className="absolute top-4 left-4 text-xl opacity-20 rotate-[-20deg]">🐾</div>
                        <div className="absolute top-10 right-6 text-xl opacity-10 rotate-[15deg]">💩</div>
                        <div className="absolute bottom-20 left-10 text-2xl opacity-10">🐾</div>

                        <div className="relative z-10 p-5 flex-1 flex flex-col h-full overflow-hidden">
                            
                            {gameState === 'start' && (
                                <div className="flex-1 flex flex-col items-center justify-center text-center">
                                    <div className="relative">
                                        <div className="text-8xl mb-6 animate-dog">🐶</div>
                                        <div className="absolute -bottom-2 -right-4 text-3xl">🦴</div>
                                    </div>
                                    <h1 className="text-4xl font-black text-stone-800 mb-2 tracking-tighter">PAW PAW BI</h1>
                                    <p className="text-stone-500 font-bold text-sm mb-12 border-b-2 border-stone-800 pb-1 px-2">汪星人 绝密 档案</p>
                                    <button onClick={() => setGameState('playing')} className="group relative w-64 bg-stone-800 text-white font-bold py-5 rounded-xl shadow-[4px_4px_0px_#000] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all text-xl">
                                        START <span className="ml-2">🐾</span>
                                    </button>
                                </div>
                            )}

                            {gameState === 'playing' && (
                                <div className="flex flex-col h-full pt-2">
                                    <div className="mb-8 flex items-center justify-between">
                                        <div className="text-[10px] font-black text-stone-400 tracking-widest uppercase">TESTING... 🐾</div>
                                        <div className="text-[10px] font-black text-stone-800">{currentQIndex + 1}/15</div>
                                    </div>
                                    <div className="w-full bg-stone-100 h-3 rounded-full border-2 border-stone-800 overflow-hidden mb-10">
                                        <div className="bg-yellow-400 h-full transition-all duration-300" style={{width: `${((currentQIndex+1)/questions.length)*100}%`}}></div>
                                    </div>
                                    
                                    <h2 className="text-2xl font-black text-stone-800 mb-10 leading-tight text-left">
                                        {questions[currentQIndex].text}
                                    </h2>
                                    
                                    <div className="space-y-4 flex-1">
                                        {questions[currentQIndex].options.map((opt, i) => (
                                            <button key={i} onClick={() => handleAnswer(opt.trait)} className="w-full p-5 border-4 border-stone-800 rounded-2xl hover:bg-yellow-50 active:bg-yellow-100 transition-all font-bold text-stone-800 text-md text-left flex items-center gap-3">
                                                <span className="text-lg">{i === 0 ? '🐶' : '🦴'}</span>
                                                {opt.text}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="text-center opacity-30 text-xs font-bold mt-4">WATCH OUT FOR 💩!</div>
                                </div>
                            )}

                            {gameState === 'result' && (
                                <div className="flex flex-col h-full justify-between py-1 animate-fade-in">
                                    <div id="final-card" className="flex-1 min-h-0 flex flex-col items-center justify-center">
                                        
                                        {/* 照片框 */}
                                        <div className="relative w-full flex-1 max-h-[60%] border-4 border-stone-800 p-3 bg-white shadow-[8px_8px_0px_rgba(0,0,0,0.1)] mb-6 transform rotate-[-1deg]">
                                            <div className="w-full h-full bg-stone-50 flex items-center justify-center overflow-hidden relative border-2 border-stone-100">
                                                {userPhoto ? (
                                                    <div className="relative w-full h-full group">
                                                        <img src={userPhoto} className="w-full h-full object-cover" />
                                                        {/* 重新上传按钮 */}
                                                        <div 
                                                            onClick={() => document.getElementById('dogInput').click()}
                                                            className="absolute top-2 right-2 bg-stone-800/80 text-white p-2 rounded-full backdrop-blur-sm pointer-events-auto cursor-pointer active:scale-90 transition-transform z-50"
                                                        >
                                                            <span className="text-xs">🔄 更换</span>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div onClick={() => document.getElementById('dogInput').click()} className="cursor-pointer text-center p-4 group">
                                                        <div className="text-5xl group-hover:scale-110 transition-transform">📸</div>
                                                        <p className="text-[10px] mt-4 text-stone-400 font-black uppercase tracking-widest border-2 border-stone-200 rounded-full px-4 py-1">Upload Dog Pic</p>
                                                    </div>
                                                )}
                                                <input id="dogInput" type="file" className="hidden" accept="image/*" onChange={handlePhotoUpload} />
                                                
                                                <div className="absolute bottom-2 left-2 w-14 h-14 stamp flex-col leading-none bg-white/40 backdrop-blur-[2px]">
                                                    <span>SECRET</span>
                                                    <span>FILE</span>
                                                    <span className="text-[6px]">PAW BI</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* 文字排版 */}
                                        <div className="text-center w-full px-2">
                                            <div className="inline-block bg-yellow-300 text-stone-800 font-black text-xs px-3 py-1 mb-2 transform rotate-2 shadow-[2px_2px_0px_#000]">
                                                {finalType}
                                            </div>
                                            <h2 className="text-4xl font-black text-stone-800 mb-3 tracking-tighter uppercase">{resultsData[finalType].title}</h2>
                                            <div className="serif-font text-stone-700 text-sm leading-relaxed max-w-[280px] mx-auto italic">
                                                “{resultsData[finalType].desc}”
                                            </div>
                                            <div className="mt-4 flex justify-center gap-2">
                                                {resultsData[finalType].tags.map(tag => (
                                                    <span key={tag} className="text-[10px] font-black text-stone-400 uppercase tracking-widest">#{tag}</span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* 底部按钮 */}
                                    <div className="pt-4 flex gap-3">
                                        <button 
                                            onClick={() => window.location.reload()}
                                            className="flex-1 py-4 text-xs font-black uppercase tracking-widest bg-stone-100 border-4 border-stone-800 rounded-xl hover:bg-stone-200 transition-all shadow-[4px_4px_0px_#292524] active:shadow-none active:translate-x-1 active:translate-y-1"
                                        >
                                            RETAKE 🐾
                                        </button>
                                        <div className="bg-stone-800 text-white p-4 rounded-xl flex items-center shadow-[4px_4px_0px_#292524]">
                                            💩
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
