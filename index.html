<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPaw BI - 汪星人性格测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 自定义动画 */
        @keyframes dogBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .animate-dog { animation: dogBounce 1.5s infinite ease-in-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        /* 狗爪图标 SVG 样式 */
        .paw-icon {
            color: #ffecd1; /* 浅橘色 */
            width: 32px;
            height: 32px;
        }

        body { background-color: #fdfaf3; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 逻辑配置 ---
        const questions = [
            { id: 1, text: "散步时遇到陌生的狗狗，它的第一反应通常是？", options: [{ text: "热情地冲上去闻屁股，疯狂摇尾巴交朋友", trait: "E" }, { text: "躲在你身后，或者假装没看见默默走开", trait: "I" }] },
            { id: 2, text: "家里来陌生的客人时，它的表现是？", options: [{ text: "兴奋到模糊！扑上去求摸摸求关注", trait: "E" }, { text: "保持警惕，或者回到自己的窝里默默观察", trait: "I" }] },
            { id: 3, text: "带它去宠物公园或者狗吧，它怎么玩？", options: [{ text: "满场飞奔，跟谁都能迅速打成一片", trait: "E" }, { text: "只喜欢跟着你，或者自己在角落闻闻嗅嗅", trait: "I" }] },
            { id: 4, text: "去宠物医院或者洗澡时，它的状态是？", options: [{ text: "依然兴奋，甚至试图跟医生/美容师套近乎", trait: "E" }, { text: "吓得发抖，开启防御模式，试图逃跑", trait: "I" }] },
            { id: 5, text: "如果它正在熟睡，什么声音能让它瞬间弹起？", options: [{ text: "零食袋撕开的“呲啦”声！", trait: "F" }, { text: "门外奇怪的脚步声或者门铃声", trait: "N" }] },
            { id: 6, text: "你给它买了一个奇形怪状的新玩具，它会？", options: [{ text: "咬两口发现不能吃，就扔在一边不管了", trait: "F" }, { text: "兴奋地研究、拆解，能自己玩上好半天", trait: "N" }] },
            { id: 7, text: "出门散步时，它最喜欢做的事情是？", options: [{ text: "低头狂吸，捡地上的不明物体试图品尝", trait: "F" }, { text: "追逐落叶、蝴蝶，或者盯着下水道看半天", trait: "N" }] },
            { id: 8, text: "训练它学习新动作时，最有效的诱惑是？", options: [{ text: "绝对是好吃的肉干，没吃的不干活", trait: "F" }, { text: "夸张的赞美，或者它最爱的网球/玩具", trait: "N" }] },
            { id: 9, text: "你坐在沙发上看电视，它通常会在哪里？", options: [{ text: "必须紧紧贴着你，甚至要坐在你身上", trait: "A" }, { text: "自己在狗窝里，或者沙发的另一端躺着", trait: "T" }] },
            { id: 10, text: "你准备出门上班，关门那一刻它的眼神是？", options: [{ text: "依依不舍，甚至扒着门嘤嘤叫求带走", trait: "A" }, { text: "毫无波澜，甚至转身回窝准备补个回笼觉", trait: "T" }] },
            { id: 11, text: "当它犯了错被你严厉批评时，它会？", options: [{ text: "飞机耳、翻肚皮，疯狂摇尾巴讨好求原谅", trait: "A" }, { text: "跟你顶嘴（对骂），或者扭头走开不理你", trait: "T" }] },
            { id: 12, text: "晚上睡觉的时候，它的习惯是？", options: [{ text: "必须挤上你的床，最好能枕着你的胳膊睡", trait: "A" }, { text: "巡视一圈领地后，在自己的专属地盘睡", trait: "T" }] },
            { id: 13, text: "面对它不喜欢吃的普通狗粮，它会？", options: [{ text: "叹口气，饿了还是会乖乖吃掉", trait: "J" }, { text: "直接打翻饭盆，或者绝食抗议直到你加肉", trait: "P" }] },
            { id: 14, text: "当它独自在家大半天后，你回家看到的场景通常是？", options: [{ text: "一切如常，它甚至还在原来的位置睡觉", trait: "J" }, { text: "垃圾桶倒了，拖鞋少了一只，沙发有个坑...", trait: "P" }] },
            { id: 15, text: "你突然大声叫它的名字，它通常的反应是？", options: [{ text: "立刻停下手头事跑过来（或者转头看你）", trait: "J" }, { text: "看心情，有时候装聋，有时候选择性听见", trait: "P" }] }
        ];

        const resultsData = {
            "EFAJ": { title: "甜心饭桶", emoji: "🍩", tags: ["社交悍匪", "干饭狂魔", "超级粘人"], desc: "万物皆可吃，只要你给的我都爱！最爱贴贴，社交满分的暖心小天使。", matchDog: "INTP 闷骚破坏王", matchHuman: "ENFJ 快乐小太阳" },
            "EFAP": { title: "社交显眼包", emoji: "🎉", tags: ["骗吃骗喝", "人来疯", "有点皮"], desc: "为了混口饭吃什么绝活都能整出来，到处散发魅力，有点小调皮的公关大师。", matchDog: "INTJ 哲学思考狗", matchHuman: "ENTP 脑洞达人" },
            "EFTJ": { title: "巡场干饭王", emoji: "🍗", tags: ["热情保安", "吃饭第一", "服从性高"], desc: "热情开朗但很有原则（尤其是对食物），守规矩的好狗狗，自带小区保安气质。", matchDog: "INAP 粘人神经质", matchHuman: "ISTJ 靠谱家长" },
            "EFTP": { title: "街头小霸王", emoji: "😎", tags: ["放荡不羁", "黑帮大佬", "为食痴狂"], desc: "热情奔放，为了一口吃的敢于挑战一切规则，放荡不羁爱自由，谁也管不住。", matchDog: "INAJ 社恐小跟班", matchHuman: "ESTP 运动健将" },
            "ENAJ": { title: "阳光小巡警", emoji: "🚔", tags: ["好奇宝宝", "妈妈的好大儿", "聪明俐落"], desc: "对世界充满好奇，但最爱的还是你。聪明听话，走到哪里都要跟你汇报。", matchDog: "IFTP 偷吃特种兵", matchHuman: "INFJ 灵魂伴侣" },
            "ENAP": { title: "乐天派二哈", emoji: "🌪️", tags: ["拆迁办主任", "脑洞清奇", "没心没肺"], desc: "脑洞极大，精力极其旺盛！走到哪拆到哪，犯错后还会撒娇求原谅，让人又爱又恨。", matchDog: "IFTJ 佛系美食家", matchHuman: "ENFP 快乐源泉" },
            "ENTJ": { title: "狗界居委会主任", emoji: "📢", tags: ["老干部", "爱管闲事", "天生领袖"], desc: "热心肠，爱管闲事，充满探索精神且遵守纪律，小区里的汪星人绝对领袖。", matchDog: "IFAP 绿茶小作精", matchHuman: "ENTJ 铁血霸总" },
            "ENTP": { title: "整活发明家", emoji: "💡", tags: ["整活大师", "绝顶聪明", "反骨仔"], desc: "哈士奇精神内核！总能想出一百种让你崩溃的新玩法，聪明全用在搞破坏上了。", matchDog: "IFAJ 嘤嘤怪", matchHuman: "INTP 极客极客" },
            "IFAJ": { title: "嘤嘤怪沙发土豆", emoji: "🛋️", tags: ["软糯小甜豆", "胆小怕事", "躺平大师"], desc: "胆子小，只粘你一个人。最大的爱好就是趴在你腿上等投喂，软糯可欺。", matchDog: "ENTP 整活发明家", matchHuman: "ESFJ 贴心小棉袄" },
            "IFAP": { title: "绿茶小作精", emoji: "🍵", tags: ["两副面孔", "戏精本精", "偷吃王者"], desc: "表面楚楚可怜惹人疼，背地里为了偷吃零食能把家里翻个底朝天。", matchDog: "ENTJ 居委会主任", matchHuman: "ISFJ 奉献者" },
            "IFTJ": { title: "佛系美食家", emoji: "🧘", tags: ["看破红尘", "只爱吃饭", "高冷"], desc: "狗生格言：“吃饱了就睡”。高冷不惹事，只对饭盆里的东西有反应。", matchDog: "ENAP 乐天派二哈", matchHuman: "ISTP 独行侠" },
            "IFTP": { title: "偷吃特种兵", emoji: "🥷", tags: ["暗影刺客", "独行侠", "干饭无影手"], desc: "独来独往的暗影刺客，平时不理人，但家里的肉干总是离奇失踪。", matchDog: "ENAJ 阳光小巡警", matchHuman: "ISFP 艺术家" },
            "INAJ": { title: "社恐小跟班", emoji: "🫣", tags: ["重度社恐", "暗中观察", "只爱你"], desc: "对外面的世界充满警惕，默默观察一切，只有躲在你身后才有安全感。", matchDog: "EFTP 街头小霸王", matchHuman: "INFP 梦想家" },
            "INAP": { title: "粘人神经质", emoji: "👻", tags: ["窝里横", "一惊一乍", "又怂又爱玩"], desc: "胆小又爱玩，常常被自己吓到。只敢在家里称王称霸，一出门就秒怂。", matchDog: "EFTJ 巡场干饭王", matchHuman: "ESFP 派对之星" },
            "INTJ": { title: "哲学思考狗", emoji: "🧐", tags: ["思想家", "高冷总裁", "自律王者"], desc: "经常静静地看着窗外思考狗生，拥有丰富的精神世界，高冷且自律。", matchDog: "EFAP 社交显眼包", matchHuman: "INTJ 幕后推手" },
            "INTP": { title: "闷骚破坏王", emoji: "🛠️", tags: ["拆家学者", "闷声干大事", "好奇心重"], desc: "平时一声不吭，趁你不在的时候默默搞个大的，致力于研究沙发内部结构。", matchDog: "EFAJ 甜心饭桶", matchHuman: "INTP 思想者" }
        };

        // --- 组件 ---
        const PawIcon = () => (
            <svg viewBox="0 0 512 512" className="paw-icon flex-shrink-0" fill="currentColor">
                <path d="M226.5 92.9c14.3 7.3 28.9 20.2 39.7 34.6 16.5 21.9 29.3 49.3 35.8 77.3 2.4 10.4 8.7 19.3 17.6 24.8 9.8 6 21.8 7.3 32.7 3.5 10.9-3.7 20-11 25.1-20.3 12.1-22.3 22-45.7 29.7-69.6 4.3-13.4 15.6-23.7 29.6-26.6 14-2.9 28.4 1.6 38.3 11.9l.4.4c21.8 22.8 33.7 52.9 33.7 84.8 0 31.8-11.8 61.9-33.5 84.6-26.3 27.5-62.8 45.3-102.2 49.9-25 2.9-49.3-1.6-71.1-12.7-21.8 11.1-46.1 15.6-71.1 12.7-39.4-4.6-75.9-22.4-102.2-49.9-21.7-22.7-33.5-52.8-33.5-84.6 0-31.9 11.9-62 33.7-84.8l.4-.4c9.9-10.3 24.3-14.8 38.3-11.9 14 2.9 25.3 13.2 29.6 26.6 7.7 23.9 17.6 47.3 29.7 69.6 5.1 9.3 14.2 16.6 25.1 20.3 10.9 3.8 22.9 2.5 32.7-3.5 8.9-5.5 15.2-14.4 17.6-24.8 6.5-28 19.3-55.4 35.8-77.3 10.8-14.4 25.4-27.3 39.7-34.6z"/>
            </svg>
        );

        function App() {
            const [gameState, setGameState] = useState('start');
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [scores, setScores] = useState({ E: 0, I: 0, F: 0, N: 0, A: 0, T: 0, J: 0, P: 0 });
            const [finalType, setFinalType] = useState(null);

            const handleAnswer = (trait) => {
                const newScores = { ...scores, [trait]: scores[trait] + 1 };
                setScores(newScores);
                if (currentQIndex < questions.length - 1) {
                    setTimeout(() => setCurrentQIndex(currentQIndex + 1), 150);
                } else {
                    calculateResult(newScores);
                }
            };

            const calculateResult = (finalScores) => {
                setGameState('loading');
                const getDim = (t1, t2) => (finalScores[t1] >= finalScores[t2] ? t1 : t2);
                const typeCode = getDim('E', 'I') + getDim('F', 'N') + getDim('A', 'T') + getDim('J', 'P');
                setTimeout(() => {
                    setFinalType(typeCode);
                    setGameState('result');
                }, 2000);
            };

            return (
                <div className="flex justify-center min-h-screen items-start p-4">
                    <div className="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col relative min-h-[700px]">
                        
                        {/* 页面内容 */}
                        <div className="relative z-10 p-6 flex-1 flex flex-col">
                            
                            {/* 开始页 */}
                            {gameState === 'start' && (
                                <div className="flex-1 flex flex-col items-center pt-10 text-center animate-fade-in">
                                    <div className="text-8xl mb-4 animate-dog">🐶</div>
                                    <h1 className="text-5xl font-black text-[#f36c21] mb-2 tracking-tight">
                                        P<span className="text-4xl">aw</span> P<span className="text-4xl">aw</span> BI
                                    </h1>
                                    <p className="text-stone-500 font-bold text-lg mb-10">全网最准的「汪星人性格测试」</p>
                                    
                                    <div className="w-full bg-[#ffecd1] p-6 rounded-3xl text-left mb-12">
                                        <h3 className="font-bold text-[#8d4016] mb-3 flex items-center">
                                            <span className="mr-2 text-lg">🐾</span> 测测你的狗子是：
                                        </h3>
                                        <ul className="space-y-2 text-[#a36b4d] font-medium">
                                            <li>✨ 社交悍匪 (E) 还是 社恐宅狗 (I)</li>
                                            <li>🍖 干饭狂魔 (F) 还是 脑洞探险家 (N)</li>
                                            <li>💕 极度粘人 (A) 还是 高冷霸总 (T)</li>
                                            <li>😇 守规矩 (J) 还是 拆家狂魔 (P)</li>
                                        </ul>
                                    </div>

                                    <button 
                                        onClick={() => setGameState('playing')}
                                        className="w-full bg-[#f36c21] text-white font-bold py-5 rounded-full shadow-lg active:scale-95 transition-all text-2xl"
                                    >
                                        开始测试
                                    </button>
                                    <p className="mt-4 text-stone-400 text-sm">*(请由铲屎官代为作答)*</p>
                                </div>
                            )}

                            {/* 答题页 */}
                            {gameState === 'playing' && (
                                <div className="animate-fade-in flex flex-col h-full pt-4">
                                    <div className="mb-8">
                                        <div className="flex justify-between text-xs font-bold text-orange-400 mb-2">
                                            <span>第 {currentQIndex + 1} 题</span>
                                            <span>{Math.round(((currentQIndex + 1) / questions.length) * 100)}%</span>
                                        </div>
                                        <div className="w-full bg-stone-100 h-2 rounded-full">
                                            <div className="bg-orange-400 h-full rounded-full transition-all duration-300" style={{width: `${((currentQIndex+1)/questions.length)*100}%`}}></div>
                                        </div>
                                    </div>
                                    <h2 className="text-2xl font-bold text-stone-800 mb-10 leading-tight">
                                        {questions[currentQIndex].text}
                                    </h2>
                                    <div className="space-y-6">
                                        {questions[currentQIndex].options.map((opt, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => handleAnswer(opt.trait)}
                                                className="w-full flex items-center p-6 border-2 border-orange-50 rounded-[2rem] hover:border-orange-400 hover:bg-orange-50 transition-all active:scale-95 text-left"
                                            >
                                                <PawIcon />
                                                <span className="ml-4 font-bold text-stone-700 text-lg leading-tight">{opt.text}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* 加载页 */}
                            {gameState === 'loading' && (
                                <div className="flex-1 flex flex-col items-center justify-center">
                                    <div className="text-7xl animate-spin-custom">🦴</div>
                                    <p className="mt-6 font-bold text-orange-500 text-lg">正在计算狗格能量...</p>
                                </div>
                            )}

                            {/* 结果页 */}
                            {gameState === 'result' && (
                                <div className="animate-fade-in pb-4">
                                    {/* 性格卡片 */}
                                    <div id="capture-area" className="bg-[#fef8ef] rounded-[2.5rem] p-6 text-center border-4 border-white shadow-inner mb-6 relative overflow-hidden">
                                        <div className="absolute top-4 right-4 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded transform rotate-12 font-bold shadow-sm">绝密狗格</div>
                                        
                                        <p className="text-stone-400 text-xs font-bold tracking-[0.2em] mb-1">PAW PAW BI</p>
                                        <p className="text-stone-400 text-[10px] mb-4">经鉴定，你的修勾属于</p>
                                        
                                        <div className="text-8xl mb-4 filter drop-shadow-md">{resultsData[finalType].emoji}</div>
                                        
                                        <h2 className="text-3xl font-black text-[#8d4016] mb-1">{resultsData[finalType].title}</h2>
                                        <p className="text-[#f36c21] font-black text-xl mb-6 tracking-widest">{finalType}</p>
                                        
                                        <div className="flex flex-wrap justify-center gap-2 mb-6">
                                            {resultsData[finalType].tags.map(tag => (
                                                <span key={tag} className="bg-white px-4 py-1.5 rounded-full text-xs font-bold text-orange-600 shadow-sm border border-orange-100">#{tag}</span>
                                            ))}
                                        </div>
                                        
                                        <div className="bg-white/70 p-5 rounded-[2rem] text-stone-700 font-medium leading-relaxed text-sm mb-8 italic">
                                            "{resultsData[finalType].desc}"
                                        </div>
                                        
                                        <div className="border-t border-dashed border-orange-200 pt-6 flex justify-between items-end px-2">
                                            <div className="text-left">
                                                <p className="text-[10px] text-stone-400 mb-1">灵魂伴侣狗</p>
                                                <p className="text-xs font-black text-stone-700">{resultsData[finalType].matchDog}</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-[10px] text-stone-400 mb-1">匹配铲屎官</p>
                                                <p className="text-xs font-black text-blue-500 bg-blue-50 px-2 py-0.5 rounded">{resultsData[finalType].matchHuman}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[10px] text-stone-400 mb-1">测测你的狗格</p>
                                                <p className="text-xs font-black text-[#f36c21]">Paw Paw BI</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 按钮 */}
                                    <div className="space-y-4">
                                        <button className="w-full bg-[#2a2624] text-white font-bold py-5 rounded-[2rem] flex items-center justify-center shadow-lg active:scale-95 transition-all text-lg">
                                            📸 截图/长按保存分享
                                        </button>
                                        <button 
                                            onClick={() => { setGameState('start'); setCurrentQIndex(0); setScores({ E: 0, I: 0, F: 0, N: 0, A: 0, T: 0, J: 0, P: 0 }); }}
                                            className="w-full bg-[#fdf2e9] text-[#8d4016] font-bold py-5 rounded-[2rem] hover:bg-[#fae8d8] active:scale-95 transition-all text-lg"
                                        >
                                            重新测试
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
