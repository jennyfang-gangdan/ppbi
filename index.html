<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PawPaw BI - 汪星人性格测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap');

        @keyframes dogBounce {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-12px) rotate(5deg); }
        }
        .animate-dog { animation: dogBounce 1.5s infinite ease-in-out; }
        .serif-font { font-family: "Georgia", "Source Han Serif SC", serif; }
        .handwriting { font-family: 'Reenie Beanie', cursive; }
        
        .bg-pattern {
            background-color: #f5f4f0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23e5e4df' fill-opacity='0.4' fill-rule='evenodd'%3E%3Cpath d='M5 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm15 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-7.5-5c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM5 40c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm15 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-7.5-5c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z'/%3E%3C/g%3E%3C/svg%3E");
        }

        /* 移除外层黑边，改用全屏无缝容器 */
        .content-wrapper {
            width: 100%;
            max-width: 500px;
            min-height: 100dvh;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .instax-photo-area {
            width: 100%;
            aspect-ratio: 1 / 1.15;
            background: white;
            padding: 10px 10px 35px 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            position: relative;
        }

        .tape {
            background: #fde047;
            transform: rotate(-1.5deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        .stat-bar { height: 4px; background: #f3f4f6; border-radius: 2px; width: 55px; overflow: hidden; }
        .stat-fill { height: 100%; background: #1c1917; }

        html, body { min-height: 100%; margin: 0; padding: 0; background-color: #f5f4f0; }
        #root { width: 100%; }
    </style>
</head>
<body class="bg-pattern">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const resultsData = {
            "EFAJ": { title: "甜心饭桶", desc: "万物皆可吃，只要你给的我都爱！最爱贴贴，社交满分的暖心小天使。", tags: ["社交悍匪", "干饭狂魔"], stats: [95, 90, 40] },
            "EFAP": { title: "社交显眼包", desc: "为了混口饭吃什么绝活都能整出来，到处散发魅力，是个有点小调皮的公关大师。", tags: ["骗吃骗喝", "有点皮"], stats: [80, 85, 60] },
            "EFTJ": { title: "巡场干饭王", desc: "热情开朗但很有原则（尤其是对食物），是个守规矩的好狗狗。", tags: ["热情保安", "吃饭第一"], stats: [60, 70, 80] },
            "EFTP": { title: "街头小霸王", desc: "热情奔放，为了一口吃的敢于挑战一切规则，谁也管不住。", tags: ["放荡不羁", "为食痴狂"], stats: [90, 60, 50] },
            "ENAJ": { title: "阳光小巡警", desc: "对世界充满好奇，但最爱的还是你。聪明听话，走到哪里都要跟你汇报。", tags: ["好奇宝宝", "聪明"], stats: [50, 95, 90] },
            "ENAP": { title: "乐天派二哈", desc: "脑洞极大，精力极其旺盛！走到哪拆到哪，犯错后还会撒娇求原谅。", tags: ["拆迁办", "脑洞清奇"], stats: [98, 80, 40] },
            "ENTJ": { title: "居委会主任", desc: "热心肠，爱管闲事，充满探索精神且遵守纪律，小区里的领袖。", tags: ["老干部", "爱管闲事"], stats: [40, 70, 95] },
            "ENTP": { title: "整活发明家", desc: "哈士奇精神内核！总能想出一百种让你崩溃的新玩法，聪明全在搞破坏。", tags: ["整活大师", "反骨仔"], stats: [95, 50, 98] },
            "IFAJ": { title: "沙发土豆", desc: "胆子小，只粘你一个人。最大的爱好就是趴在你腿上等投喂。", tags: ["软糯小甜豆", "躺平"], stats: [20, 98, 30] },
            "IFAP": { title: "绿茶小作精", desc: "表面楚楚可怜惹人疼，背地里为了偷吃零食能把家里翻个底朝天。", tags: ["两副面孔", "偷吃王"], stats: [70, 85, 50] },
            "IFTJ": { title: "佛系美食家", desc: "狗生格言：“吃饱了就睡”。高冷不惹事，只对饭盆有反应。", tags: ["看破红尘", "只爱饭"], stats: [10, 40, 60] },
            "IFTP": { title: "偷吃特种兵", desc: "独来独往，平时不理人，但家里的肉干总是离奇失踪。", tags: ["暗影刺客", "手速快"], stats: [85, 20, 70] },
            "INAJ": { title: "社恐小跟班", desc: "对外面的世界充满警惕，只有躲在你身后才有安全感。", tags: ["重度社恐", "只爱你"], stats: [15, 98, 85] },
            "INAP": { title: "粘人神经质", desc: "胆小又爱玩，常常被自己吓到。只敢在家里称王称霸。", tags: ["窝里横", "一惊一乍"], stats: [75, 90, 45] },
            "INTJ": { title: "哲学思考狗", desc: "经常静静地看着窗外思考狗生，拥有丰富的精神世界，高冷且自律。", tags: ["思想家", "高冷总裁"], stats: [20, 30, 95] },
            "INTP": { title: "闷骚破坏王", desc: "平时一声不吭，趁你不在的时候默默搞个大的，致力于拆解沙发。", tags: ["拆家学者", "好奇心"], stats: [90, 20, 95] }
        };

        // 扩充至 15 道题目
        const questions = [
            { id: 1, text: "散步遇到陌生的狗，它的第一反应？", options: [{ text: "热情地冲上去闻屁股", trait: "E" }, { text: "躲在你身后默默观察", trait: "I" }] },
            { id: 2, text: "家里来客人时，它的表现？", options: [{ text: "兴奋到模糊！求摸摸", trait: "E" }, { text: "保持警惕或回到窝里", trait: "I" }] },
            { id: 3, text: "在狗公园里，它怎么玩？", options: [{ text: "满场飞奔到处社交", trait: "E" }, { text: "只跟着你或闻闻草地", trait: "I" }] },
            { id: 4, text: "对于没见过的新奇食物？", options: [{ text: "管它呢，先吃了再说", trait: "F" }, { text: "先仔细闻闻观察半天", trait: "N" }] },
            { id: 5, text: "面对一个会动的奇怪玩具？", options: [{ text: "被吓一跳但马上开撕", trait: "F" }, { text: "歪着头思考研究它的原理", trait: "N" }] },
            { id: 6, text: "如果你假装哭泣，它会？", options: [{ text: "马上跑过来舔你安慰你", trait: "A" }, { text: "疑惑地看着你，然后走开", trait: "T" }] },
            { id: 7, text: "当它犯错被你训斥时？", options: [{ text: "耳朵贴平，眼神委屈极了", trait: "A" }, { text: "眼神躲避，甚至试图顶嘴", trait: "T" }] },
            { id: 8, text: "每天散步的时间点？", options: [{ text: "非常精准，到点就催你", trait: "J" }, { text: "随缘，你什么时候带它都行", trait: "P" }] },
            { id: 9, text: "你换了新发型回家，它的反应？", options: [{ text: "依然秒认出你并疯狂欢迎", trait: "E" }, { text: "愣住几秒，怀疑地闻闻你", trait: "I" }] },
            { id: 10, text: "如果家里突然搬家换了环境？", options: [{ text: "很快就开始到处巡视领地", trait: "N" }, { text: "萎靡几天，缩在角落不出来", trait: "F" }] },
            { id: 11, text: "学习新动作（如握手）的速度？", options: [{ text: "为了零食秒会，执行精准", trait: "J" }, { text: "看心情，有时懂也装不懂", trait: "P" }] },
            { id: 12, text: "它对小孩子的态度是？", options: [{ text: "温柔忍让，随便怎么摸", trait: "A" }, { text: "保持距离，不耐烦就溜", trait: "T" }] },
            { id: 13, text: "睡觉时的位置通常在？", options: [{ text: "必须挨着你，或者钻被窝", trait: "A" }, { text: "喜欢睡在门口或地板中央", trait: "T" }] },
            { id: 14, text: "你出门没带它，你回来时？", options: [{ text: "家里的拖鞋和纸巾遭了殃", trait: "P" }, { text: "它安稳地在门口等你", trait: "J" }] },
            { id: 15, text: "它对世界的好奇心体现在？", options: [{ text: "哪里有洞钻哪里，爱探险", trait: "N" }, { text: "只对自己的一亩三分地感兴趣", trait: "F" }] }
        ];

        function App() {
            const [gameState, setGameState] = useState('start');
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [scores, setScores] = useState({ E: 0, I: 0, F: 0, N: 0, A: 0, T: 0, J: 0, P: 0 });
            const [finalType, setFinalType] = useState(null);
            const [userPhoto, setUserPhoto] = useState(null);
            const resultRef = useRef(null);

            const handleAnswer = (trait) => {
                const newScores = { ...scores, [trait]: scores[trait] + 1 };
                setScores(newScores);
                if (currentQIndex < questions.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                } else {
                    const getDim = (t1, t2) => (newScores[t1] >= newScores[t2] ? t1 : t2);
                    setFinalType(getDim('E', 'I') + getDim('F', 'N') + getDim('A', 'T') + getDim('J', 'P'));
                    setGameState('result');
                }
            };

            const saveCardAsImage = () => {
                html2canvas(resultRef.current, { backgroundColor: "#f5f4f0", scale: 3 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `PawPawResult.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            };

            return (
                <div className="content-wrapper">
                    <div className="p-8 flex flex-col flex-1 relative z-10">
                        
                        {gameState === 'start' && (
                            <div className="flex-1 flex flex-col items-center justify-center text-center">
                                <div className="text-8xl animate-dog mb-10">🐶</div>
                                <h1 className="text-4xl font-black text-stone-800 mb-2 tracking-tighter">PAWPAW BI</h1>
                                <p className="text-stone-400 font-bold text-xs mb-16 tracking-[0.2em] border-b border-stone-200 pb-2 uppercase">Detective Doggo Lab</p>
                                <button onClick={() => setGameState('playing')} className="w-full bg-stone-800 text-white font-bold py-5 rounded-2xl shadow-[6px_6px_0px_#fde047] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all text-xl uppercase tracking-tight">
                                    开始测试 (15题) 🐾
                                </button>
                            </div>
                        )}

                        {gameState === 'playing' && (
                            <div className="flex-1 flex flex-col pt-10">
                                <div className="mb-6 flex items-center justify-between">
                                    <span className="text-xs font-black text-stone-400 tracking-widest uppercase">Analyzing...</span>
                                    <span className="text-xs font-black text-stone-800">{currentQIndex + 1}/{questions.length}</span>
                                </div>
                                <div className="w-full bg-stone-200 h-2 rounded-full overflow-hidden mb-12">
                                    <div className="bg-stone-800 h-full transition-all" style={{width: `${((currentQIndex+1)/questions.length)*100}%`}}></div>
                                </div>
                                <h2 className="text-2xl font-black text-stone-800 mb-10 leading-tight min-h-[3.5rem]">{questions[currentQIndex].text}</h2>
                                <div className="space-y-4">
                                    {questions[currentQIndex].options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt.trait)} className="w-full p-5 border-2 border-stone-800 rounded-2xl hover:bg-yellow-50 active:bg-yellow-100 transition-all font-bold text-stone-800 text-base text-left shadow-sm">
                                            {opt.text}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {gameState === 'result' && (
                            <div className="flex-1 flex flex-col justify-start py-4">
                                <div ref={resultRef} className="bg-white p-4 flex flex-col items-center rounded-3xl shadow-xl">
                                    <div className="instax-photo-area transform rotate-[-1deg] mb-6 border border-stone-100 shadow-sm">
                                        <div className="w-full h-full bg-stone-50 flex items-center justify-center overflow-hidden relative shadow-inner">
                                            {userPhoto ? <img src={userPhoto} className="w-full h-full object-cover" /> : 
                                                <div onClick={() => document.getElementById('dogInput').click()} className="text-center p-4 cursor-pointer">
                                                    <div className="text-4xl mb-2 opacity-50">📸</div>
                                                    <p className="text-[10px] text-stone-400 font-black uppercase tracking-widest">点击上传萌照</p>
                                                </div>
                                            }
                                            <input id="dogInput" type="file" className="hidden" accept="image/*" onChange={(e) => {
                                                const file = e.target.files[0];
                                                if (file) {
                                                    const reader = new FileReader();
                                                    reader.onload = (ev) => setUserPhoto(ev.target.result);
                                                    reader.readAsDataURL(file);
                                                }
                                            }} />
                                            <div className="absolute bottom-2 right-2 w-10 h-10 rounded-full border border-stone-200 flex items-center justify-center rotate-12 bg-white/30 backdrop-blur-[1px]">
                                                <span className="text-[6px] text-stone-500 font-black text-center uppercase">Paw<br/>BI</span>
                                            </div>
                                        </div>
                                        <div className="absolute bottom-2 left-5 handwriting text-stone-600 text-xl font-bold">
                                            {new Date().toLocaleDateString()}
                                        </div>
                                    </div>

                                    <div className="text-center w-full">
                                        <div className="inline-block tape text-stone-800 font-black text-xs px-4 py-1 mb-3 uppercase tracking-wider">TYPE: {finalType}</div>
                                        <h2 className="text-3xl font-black text-stone-800 mb-4 tracking-tight uppercase">{resultsData[finalType].title}</h2>
                                        
                                        <div className="flex justify-center gap-5 mb-6">
                                            {['拆家', '粘人', '智商'].map((label, idx) => (
                                                <div key={idx} className="flex flex-col items-center">
                                                    <span className="text-[10px] font-black text-stone-600 mb-1.5">{label}</span>
                                                    <div className="stat-bar"><div className="stat-fill" style={{width: `${resultsData[finalType].stats[idx]}%`}}></div></div>
                                                </div>
                                            ))}
                                        </div>

                                        <p className="serif-font text-stone-600 text-xs leading-relaxed italic px-6 mb-6">“{resultsData[finalType].desc}”</p>
                                        
                                        <div className="flex justify-center gap-4 mb-6">
                                            {resultsData[finalType].tags.map((tag, idx) => (
                                                <span key={idx} className="text-xs font-black text-stone-800 bg-stone-100 px-2 py-0.5 rounded">#{tag}</span>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="mt-2 mb-2 pt-4 border-t border-stone-100 w-full flex justify-center opacity-40">
                                        <span className="text-[9px] font-black tracking-[0.3em] text-stone-800 uppercase">PawPaw BI 性格研究所</span>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-3 mt-8 pb-10">
                                    <button onClick={saveCardAsImage} className="w-full py-5 text-sm font-black bg-yellow-400 border-[3px] border-stone-800 rounded-2xl shadow-[6px_6px_0px_#000] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all uppercase tracking-widest">保存我的结果卡片 📸</button>
                                    <button onClick={() => window.location.reload()} className="py-2 text-xs font-black text-stone-400 uppercase tracking-widest hover:text-stone-800 transition-colors">重新测试</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
