<body class="bg-pattern flex items-center justify-center m-0 p-0 overflow-hidden">
    <div id="root" class="w-full h-full flex items-center justify-center"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // ... 之前的 questions 和 resultsData 保持不变 ...

        function App() {
            const [gameState, setGameState] = useState('start');
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [scores, setScores] = useState({ E: 0, I: 0, F: 0, N: 0, A: 0, T: 0, J: 0, P: 0 });
            const [finalType, setFinalType] = useState(null);
            const [userPhoto, setUserPhoto] = useState(null);
            const resultRef = useRef(null);

            const handleAnswer = (trait) => {
                const newScores = { ...scores, [trait]: scores[trait] + 1 };
                setScores(newScores);
                if (currentQIndex < questions.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                } else {
                    const getDim = (t1, t2) => (newScores[t1] >= newScores[t2] ? t1 : t2);
                    setFinalType(getDim('E', 'I') + getDim('F', 'N') + getDim('A', 'T') + getDim('J', 'P'));
                    setGameState('result');
                }
            };

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setUserPhoto(ev.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const saveCardAsImage = () => {
                if (resultRef.current) {
                    html2canvas(resultRef.current, {
                        backgroundColor: "#f5f4f0",
                        scale: 2,
                        useCORS: true
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `PawPawBI_${finalType}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    });
                }
            };

            return (
                /* 核心修复：使用 min-h-[100dvh] 并添加安全区域 padding */
                <div className="w-screen min-h-[100dvh] flex items-center justify-center p-4 box-border" 
                     style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
                    
                    {/* 卡片容器：移除固定高度，使用 flex-col 适应内容 */}
                    <div className="w-full max-w-[390px] h-fit max-h-[90vh] bg-white rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col relative border-[6px] border-stone-800">
                        
                        <div className="absolute top-6 left-6 text-xl opacity-20 rotate-[-20deg]">🐾</div>
                        <div className="absolute top-10 right-8 text-xl opacity-10 rotate-[15deg]">💩</div>
                        
                        <div className="relative z-10 p-6 flex-1 flex flex-col overflow-hidden">
                            
                            {gameState === 'start' && (
                                <div className="py-12 flex flex-col items-center justify-center text-center">
                                    <div className="relative">
                                        <div className="text-8xl mb-8 animate-dog">🐶</div>
                                        <div className="absolute -bottom-2 -right-4 text-3xl">🦴</div>
                                    </div>
                                    <h1 className="text-4xl font-black text-stone-800 mb-2 tracking-tighter">PAW PAW BI</h1>
                                    <p className="text-stone-500 font-bold text-sm mb-12 border-b-2 border-stone-800 pb-1 px-4">汪星人 绝密 档案</p>
                                    <button onClick={() => setGameState('playing')} className="w-64 bg-stone-800 text-white font-bold py-5 rounded-2xl shadow-[6px_6px_0px_#000] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all text-xl">
                                        START 🐾
                                    </button>
                                </div>
                            )}

                            {gameState === 'playing' && (
                                <div className="flex flex-col pt-2">
                                    <div className="mb-6 flex items-center justify-between">
                                        <div className="text-[10px] font-black text-stone-400 tracking-widest uppercase">TESTING...</div>
                                        <div className="text-[10px] font-black text-stone-800">{currentQIndex + 1}/15</div>
                                    </div>
                                    <div className="w-full bg-stone-100 h-3 rounded-full border-2 border-stone-800 overflow-hidden mb-8">
                                        <div className="bg-yellow-400 h-full transition-all duration-300" style={{width: `${((currentQIndex+1)/questions.length)*100}%`}}></div>
                                    </div>
                                    <h2 className="text-2xl font-black text-stone-800 mb-8 leading-tight">{questions[currentQIndex].text}</h2>
                                    <div className="space-y-3 pb-4">
                                        {questions[currentQIndex].options.map((opt, i) => (
                                            <button key={i} onClick={() => handleAnswer(opt.trait)} className="w-full p-5 border-[3px] border-stone-800 rounded-2xl hover:bg-yellow-50 active:bg-yellow-100 transition-all font-bold text-stone-800 text-md text-left flex items-center gap-3">
                                                <span>{i === 0 ? '🐶' : '🦴'}</span>
                                                {opt.text}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {gameState === 'result' && (
                                <div className="flex flex-col animate-fade-in overflow-y-auto no-scrollbar">
                                    <div ref={resultRef} className="flex flex-col items-center justify-center p-2">
                                        <div className="instax-photo-area transform rotate-[-1.5deg] mb-6">
                                            <div className="w-full h-full bg-stone-100 flex items-center justify-center overflow-hidden relative border border-stone-200">
                                                {userPhoto ? (
                                                    <img src={userPhoto} className="w-full h-full object-cover" />
                                                ) : (
                                                    <div onClick={() => document.getElementById('dogInput').click()} className="cursor-pointer text-center">
                                                        <div className="text-4xl">📸</div>
                                                        <p className="text-[10px] mt-2 text-stone-400 font-black uppercase">Upload Pic</p>
                                                    </div>
                                                )}
                                                <input id="dogInput" type="file" className="hidden" accept="image/*" onChange={handlePhotoUpload} />
                                                <div className="absolute bottom-2 right-2 w-10 h-10 stamp bg-white/30">
                                                    <span className="text-[6px]">PAW BI</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="text-center mb-6">
                                            <div className="inline-block bg-yellow-300 text-stone-800 font-black text-[10px] px-2 py-0.5 mb-2 shadow-[2px_2px_0px_#000]">
                                                {finalType}
                                            </div>
                                            <h2 className="text-3xl font-black text-stone-800 mb-2 uppercase">{resultsData[finalType].title}</h2>
                                            <p className="serif-font text-stone-600 text-xs italic px-4">“{resultsData[finalType].desc}”</p>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-3 pb-4">
                                        <button onClick={saveCardAsImage} className="w-full py-4 text-xs font-black uppercase bg-yellow-400 border-[3px] border-stone-800 rounded-xl shadow-[4px_4px_0px_#000] active:shadow-none">
                                            SAVE PHOTO 📸
                                        </button>
                                        <button onClick={() => window.location.reload()} className="w-full py-2 text-[10px] font-black text-stone-400 uppercase">
                                            RETAKE 🐾
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
