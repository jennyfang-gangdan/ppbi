<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PawPaw BI - 汪星人性格测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap');

        @keyframes dogBounce {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-12px) rotate(5deg); }
        }
        .animate-dog { animation: dogBounce 1.5s infinite ease-in-out; }
        .serif-font { font-family: "Georgia", "Source Han Serif SC", serif; }
        .handwriting { font-family: 'Reenie Beanie', cursive; }
        
        .bg-pattern {
            background-color: #f5f4f0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23e5e4df' fill-opacity='0.4' fill-rule='evenodd'%3E%3Cpath d='M5 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm15 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-7.5-5c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM5 40c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm15 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-7.5-5c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z'/%3E%3C/g%3E%3C/svg%3E");
        }

        /* --- 核心锚定：锁定外层容器 --- */
        .fixed-screen-container {
            width: 85vw;
            max-width: 360px;
            /* 锚定 iPhone 13/14 比例 */
            aspect-ratio: 390 / 844; 
            /* 动态视口高度，防止手机底栏遮挡 */
            max-height: 88dvh; 
            background: white;
            border-radius: 40px;
            border: 8px solid #1c1917; 
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .instax-photo-area {
            width: 100%;
            aspect-ratio: 1 / 1.2; /* 拍立得照片区域比例 */
            background: white;
            padding: 8px 8px 35px 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .tape {
            background: #fde047;
            transform: rotate(-1.5deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        .stat-bar { height: 4px; background: #f3f4f6; border-radius: 2px; width: 55px; overflow: hidden; }
        .stat-fill { height: 100%; background: #1c1917; }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #f5f4f0; }
        #root { height: 100%; width: 100%; display: flex; align-items: center; justify-content: center; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-pattern">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const resultsData = {
            "EFAJ": { title: "甜心饭桶", desc: "万物皆可吃，只要你给的我都爱！最爱贴贴，社交满分的暖心小天使。", tags: ["社交悍匪", "干饭狂魔"], stats: [95, 90, 40] },
            "EFAP": { title: "社交显眼包", desc: "为了混口饭吃什么绝活都能整出来，到处散发魅力，是个有点小调皮的公关大师。", tags: ["骗吃骗喝", "有点皮"], stats: [80, 85, 60] },
            "EFTJ": { title: "巡场干饭王", desc: "热情开朗但很有原则（尤其是对食物），是个守规矩的好狗狗。", tags: ["热情保安", "吃饭第一"], stats: [60, 70, 80] },
            "EFTP": { title: "街头小霸王", desc: "热情奔放，为了一口吃的敢于挑战一切规则，谁也管不住。", tags: ["放荡不羁", "为食痴狂"], stats: [90, 60, 50] },
            "ENAJ": { title: "阳光小巡警", desc: "对世界充满好奇，但最爱的还是你。聪明听话，走到哪里都要跟你汇报。", tags: ["好奇宝宝", "聪明"], stats: [50, 95, 90] },
            "ENAP": { title: "乐天派二哈", desc: "脑洞极大，精力极其旺盛！走到哪拆到哪，犯错后还会撒娇求原谅。", tags: ["拆迁办", "脑洞清奇"], stats: [98, 80, 40] },
            "ENTJ": { title: "居委会主任", desc: "热心肠，爱管闲事，充满探索精神且遵守纪律，小区里的领袖。", tags: ["老干部", "爱管闲事"], stats: [40, 70, 95] },
            "ENTP": { title: "整活发明家", desc: "哈士奇精神内核！总能想出一百种让你崩溃的新玩法，聪明全在搞破坏。", tags: ["整活大师", "反骨仔"], stats: [95, 50, 98] },
            "IFAJ": { title: "沙发土豆", desc: "胆子小，只粘你一个人。最大的爱好就是趴在你腿上等投喂。", tags: ["软糯小甜豆", "躺平"], stats: [20, 98, 30] },
            "IFAP": { title: "绿茶小作精", desc: "表面楚楚可怜惹人疼，背地里为了偷吃零食能把家里翻个底朝天。", tags: ["两副面孔", "偷吃王"], stats: [70, 85, 50] },
            "IFTJ": { title: "佛系美食家", desc: "狗生格言：“吃饱了就睡”。高冷不惹事，只对饭盆有反应。", tags: ["看破红尘", "只爱饭"], stats: [10, 40, 60] },
            "IFTP": { title: "偷吃特种兵", desc: "独来独往，平时不理人，但家里的肉干总是离奇失踪。", tags: ["暗影刺客", "手速快"], stats: [85, 20, 70] },
            "INAJ": { title: "社恐小跟班", desc: "对外面的世界充满警惕，只有躲在你身后才有安全感。", tags: ["重度社恐", "只爱你"], stats: [15, 98, 85] },
            "INAP": { title: "粘人神经质", desc: "胆小又爱玩，常常被自己吓到。只敢在家里称王称霸。", tags: ["窝里横", "一惊一乍"], stats: [75, 90, 45] },
            "INTJ": { title: "哲学思考狗", desc: "经常静静地看着窗外思考狗生，拥有丰富的精神世界，高冷且自律。", tags: ["思想家", "高冷总裁"], stats: [20, 30, 95] },
            "INTP": { title: "闷骚破坏王", desc: "平时一声不吭，趁你不在的时候默默搞个大的，致力于拆解沙发。", tags: ["拆家学者", "好奇心"], stats: [90, 20, 95] }
        };

        const questions = [
            { id: 1, text: "散步时遇到陌生的狗狗，它的第一反应？", options: [{ text: "热情地冲上去闻屁股，疯狂摇尾巴", trait: "E" }, { text: "躲在你身后，或者假装没看见默默走开", trait: "I" }] },
            { id: 2, text: "家里来陌生的客人时，它的表现是？", options: [{ text: "兴奋到模糊！扑上去求摸摸", trait: "E" }, { text: "保持警惕，或者回到窝里默默观察", trait: "I" }] },
            { id: 3, text: "带它去宠物公园，它怎么玩？", options: [{ text: "满场飞奔，跟谁都能迅速打成一片", trait: "E" }, { text: "只喜欢跟着你，或者自己在角落闻闻", trait: "I" }] },
            { id: 4, text: "如果它正在熟睡，什么声音能让它瞬间弹起？", options: [{ text: "零食袋撕开的“呲啦”声！", trait: "F" }, { text: "门外奇怪的脚步声或者门铃声", trait: "N" }] },
            { id: 5, text: "你给它买了一个奇形怪状的新玩具，它会？", options: [{ text: "咬两口发现不能吃，就扔在一边不管了", trait: "F" }, { text: "兴奋地研究、拆解，能自己玩上好半天", trait: "N" }] },
            { id: 6, text: "你坐在沙发上看电视，它通常会在哪里？", options: [{ text: "必须紧紧贴着你，甚至要坐在你身上", trait: "A" }, { text: "自己在狗窝里，或者沙发的另一端躺着", trait: "T" }] },
            { id: 7, text: "你准备出门上班，关门那一刻它的眼神？", options: [{ text: "依依不舍，甚至扒着门嘤嘤叫求带走", trait: "A" }, { text: "毫无波澜，甚至转身回窝准备补觉", trait: "T" }] },
            { id: 8, text: "当它独自在家大半天后，你回家看到的场景？", options: [{ text: "一切如常，它甚至还在原来的位置睡觉", trait: "J" }, { text: "垃圾桶倒了，拖鞋少了一只，沙发有个坑", trait: "P" }] }
        ];

        function App() {
            const [gameState, setGameState] = useState('start');
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [scores, setScores] = useState({ E: 0, I: 0, F: 0, N: 0, A: 0, T: 0, J: 0, P: 0 });
            const [finalType, setFinalType] = useState(null);
            const [userPhoto, setUserPhoto] = useState(null);
            const resultRef = useRef(null);

            const handleAnswer = (trait) => {
                const newScores = { ...scores, [trait]: scores[trait] + 1 };
                setScores(newScores);
                if (currentQIndex < questions.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                } else {
                    const getDim = (t1, t2) => (newScores[t1] >= newScores[t2] ? t1 : t2);
                    setFinalType(getDim('E', 'I') + getDim('F', 'N') + getDim('A', 'T') + getDim('J', 'P'));
                    setGameState('result');
                }
            };

            const saveCardAsImage = () => {
                html2canvas(resultRef.current, { backgroundColor: "#f5f4f0", scale: 3 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `PawPawBI_Result.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            };

            return (
                /* 统一容器类名与尺寸 */
                <div className="fixed-screen-container no-scrollbar overflow-y-auto">
                    <div className="p-6 flex flex-col min-h-full relative z-10">
                        
                        {gameState === 'start' && (
                            <div className="flex-1 flex flex-col items-center justify-center text-center py-6">
                                <div className="text-7xl animate-dog mb-8">🐶</div>
                                <h1 className="text-3xl font-black text-stone-800 mb-2 tracking-tighter">PAWPAW BI</h1>
                                <p className="text-stone-400 font-bold text-[10px] mb-12 tracking-widest border-b border-stone-100 pb-1 uppercase">Detective Doggo Lab</p>
                                <button onClick={() => setGameState('playing')} className="w-full bg-stone-800 text-white font-bold py-4 rounded-2xl shadow-[5px_5px_0px_#fde047] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all text-lg uppercase tracking-tight">
                                    开始测试 🐾
                                </button>
                            </div>
                        )}

                        {gameState === 'playing' && (
                            <div className="flex-1 flex flex-col pt-4">
                                <div className="mb-4 flex items-center justify-between">
                                    <span className="text-[9px] font-black text-stone-400 tracking-widest uppercase tracking-widest">Analyzing...</span>
                                    <span className="text-[9px] font-black text-stone-800">{currentQIndex + 1}/{questions.length}</span>
                                </div>
                                <div className="w-full bg-stone-100 h-1.5 rounded-full overflow-hidden mb-8">
                                    <div className="bg-stone-800 h-full transition-all" style={{width: `${((currentQIndex+1)/questions.length)*100}%`}}></div>
                                </div>
                                <h2 className="text-xl font-black text-stone-800 mb-8 leading-tight">{questions[currentQIndex].text}</h2>
                                <div className="space-y-3">
                                    {questions[currentQIndex].options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt.trait)} className="w-full p-4 border-2 border-stone-800 rounded-xl hover:bg-yellow-50/50 active:bg-yellow-50 transition-all font-bold text-stone-800 text-sm text-left">
                                            {opt.text}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {gameState === 'result' && (
                            <div className="flex-1 flex flex-col justify-between py-2">
                                <div ref={resultRef} className="bg-white p-2 flex flex-col items-center">
                                    <div className="instax-photo-area transform rotate-[-1deg] mb-4 border border-stone-100 shadow-sm">
                                        <div className="w-full h-full bg-stone-50 flex items-center justify-center overflow-hidden relative shadow-inner">
                                            {userPhoto ? <img src={userPhoto} className="w-full h-full object-cover" /> : 
                                                <div onClick={() => document.getElementById('dogInput').click()} className="text-center p-4 cursor-pointer">
                                                    <div className="text-3xl mb-1 opacity-50">📸</div>
                                                    <p className="text-[8px] text-stone-300 font-black uppercase tracking-widest">Upload Photo</p>
                                                </div>
                                            }
                                            <input id="dogInput" type="file" className="hidden" accept="image/*" onChange={(e) => {
                                                const file = e.target.files[0];
                                                if (file) {
                                                    const reader = new FileReader();
                                                    reader.onload = (ev) => setUserPhoto(ev.target.result);
                                                    reader.readAsDataURL(file);
                                                }
                                            }} />
                                            <div className="absolute bottom-2 right-2 w-9 h-9 rounded-full border border-stone-200 flex items-center justify-center rotate-12 bg-white/20 backdrop-blur-[1px]">
                                                <span className="text-[5px] text-stone-400 font-black text-center uppercase">Paw<br/>BI</span>
                                            </div>
                                        </div>
                                        <div className="absolute bottom-2 left-4 handwriting text-stone-500 text-lg font-bold">
                                            {new Date().toLocaleDateString()}
                                        </div>
                                    </div>

                                    <div className="text-center w-full">
                                        <div className="inline-block tape text-stone-800 font-black text-[10px] px-3 py-0.5 mb-2 uppercase tracking-wide">TYPE: {finalType}</div>
                                        <h2 className="text-2xl font-black text-stone-800 mb-3 tracking-tight uppercase">{resultsData[finalType].title}</h2>
                                        <div className="flex justify-center gap-3 mb-4 scale-95">
                                            {['拆家', '粘人', '智商'].map((label, idx) => (
                                                <div key={idx} className="flex flex-col items-center">
                                                    <span className="text-[8px] font-bold text-stone-600 mb-1">{label}</span>
                                                    <div className="stat-bar"><div className="stat-fill" style={{width: `${resultsData[finalType].stats[idx]}%`}}></div></div>
                                                </div>
                                            ))}
                                        </div>
                                        <p className="serif-font text-stone-600 text-[10px] leading-relaxed italic px-4 mb-3">“{resultsData[finalType].desc}”</p>
                                        <div className="flex justify-center gap-3 mb-4">
                                            {resultsData[finalType].tags.map((tag, idx) => (
                                                <span key={idx} className="text-[10px] font-black text-stone-600">#{tag}</span>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="mt-1 mb-2 pt-2 border-t border-stone-50 w-full flex justify-center opacity-30">
                                        <span className="text-[8px] font-black tracking-[0.2em] text-stone-800 uppercase">PawPaw BI性格研究所</span>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-2 mt-4 pb-2">
                                    <button onClick={saveCardAsImage} className="w-full py-4 text-xs font-black bg-yellow-400 border-[3px] border-stone-800 rounded-xl shadow-[4px_4px_0px_#000] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all uppercase tracking-wider">保存结果 📸</button>
                                    <button onClick={() => window.location.reload()} className="py-1 text-[9px] font-black text-stone-400 uppercase tracking-widest hover:text-stone-800 transition-colors">再次测试</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
